<!DOCTYPE html>
<html>

<head>

    <title>Meeting Summarizer AI</title>

    <style>

        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 150px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Meeting Summarizer & Action Extractor</h1>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="audio" required>

        <br><br>

        <button type="submit">
            Upload Audio
        </button>

    </form>

    {% if transcript %}

    <h2>Transcript</h2>

    <textarea readonly>
{{ transcript }}
    </textarea>

    <h2>Summary</h2>

    <textarea readonly>
{{ summary }}
    </textarea>

    <h2>Action Items</h2>

    <ul>

        {% for item in action_items %}

        <li>{{ item }}</li>

        {% endfor %}

    </ul>

    {% endif %}

</div>

</body>

</html>
